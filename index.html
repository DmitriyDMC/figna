<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нахилений Слайдер у стилі Star Wars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            overflow-x: hidden;
        }

        /* Контейнер з перспективою */
        .slider-wrapper {
            display: flex;
            width: 120%; /* Трохи ширше, щоб компенсувати нахил по краях */
            margin-left: -10%; 
            height: 80vh;
            align-items: center;
            justify-content: center;
            gap: 15px; /* Проміжок між рамками */
            padding: 20px;
        }

        /* Основний стиль панелі з нахилом */
        .panel {
            position: relative;
            height: 100%;
            flex: 1;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            
            /* Нахил */
            transform: skewX(-8deg); 
            
            /* Рамка */
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        /* Внутрішній контент (картинка) має бути нахилений у зворотний бік, 
           щоб зображення не виглядало деформованим */
        .panel-inner {
            position: absolute;
            top: 0;
            left: -20%; /* Компенсація нахилу */
            width: 140%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transform: skewX(8deg); 
            transition: transform 0.6s ease;
            filter: grayscale(60%) brightness(0.7);
        }

        /* Ефект при наведенні */
        .panel:hover {
            flex: 4;
            transform: skewX(-8deg) scale(1.02);
            border-color: rgba(255, 255, 255, 0.8);
            z-index: 5;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .panel:hover .panel-inner {
            filter: grayscale(0%) brightness(1);
        }

        /* Текст всередині */
        .panel-content {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) skewX(8deg); /* Текст рівний */
            color: white;
            text-align: center;
            width: 100%;
            opacity: 0;
            transition: opacity 0.4s ease;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 10;
        }

        .panel:hover .panel-content {
            opacity: 1;
        }

        /* Стиль головного заголовка */
        .main-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            color: white;
            font-size: 6vw;
            font-weight: 900;
            text-transform: uppercase;
            pointer-events: none;
            mix-blend-mode: difference;
            letter-spacing: 10px;
            white-space: nowrap;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="relative w-full overflow-hidden">
        <h1 class="main-logo"></h1>
        
        <div class="slider-wrapper">
            <!-- Панель 1 -->
            <div class="panel">
                <div class="panel-inner" style="background-image: url('/07.11.2025\(5\).jpg');"></div>
                <div class="panel-content"></div>
            </div>

            <!-- Панель 2 -->
            <div class="panel">
                <div class="panel-inner" style="background-image: url('/25.02.2026\(3\).jpg');"></div>
                <div class="panel-content"></div>
            </div>

            <!-- Панель 3 -->
            <div class="panel">
                <div class="panel-inner" style="background-image: url('/27.02.2026\(1\).jpg');"></div>
                <div class="panel-content"></div>
            </div>

            <!-- Панель 4 -->
            <div class="panel">
                <div class="panel-inner" style="background-image: url('/27.02.2026\(4\).jpg');"></div>
                <div class="panel-content"></div>
            </div>

            <!-- Панель 5 -->
            
        </div>
    </div>

</body>
</html>
